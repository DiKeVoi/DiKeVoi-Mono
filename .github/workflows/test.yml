# CI Pipeline: Chạy test, coverage và phân tích SonarCloud
# Đáp ứng yêu cầu đồ án: Coverage ≥ 70%, test-report artifact

name: Test and Analyze

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-analyze:
    name: Run Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code với full history cho SonarCloud
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Cài đặt dependencies
      - name: Install dependencies
        run: npm ci
        # Hoặc dùng npm install --legacy-peer-deps nếu gặp lỗi peer dependency

      # 4. Chạy Jest với coverage (tạo lcov.info và HTML report)
      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=html --coverageReporters=text-summary
        env:
          # Mock environment variables để test không cần file .env
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_KEY: placeholder_key

      # 5. Upload test-report artifact (file index.html)
      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()  # Vẫn upload ngay cả khi test fail
        with:
          name: test-report
          path: coverage/lcov-report/index.html
          retention-days: 7

      # 6. Cài đặt và chạy SonarCloud Scanner
      - name: Install SonarQube Scanner
        run: npm install -g sonarqube-scanner

      - name: SonarCloud Scan
        run: sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io