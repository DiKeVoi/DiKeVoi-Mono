sonar.projectKey=dikevoi
sonar.projectName=DiKeVoi-Mono
sonar.projectVersion=1.0.0
sonar.organization=dikevoi

# Sources
sonar.sources=backend/app,frontend/app,frontend/components,frontend/hooks,frontend/constants

# Backend (Python)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.version=3.11

# Frontend (JavaScript/TypeScript)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.exclusions=**/venv/**,**/__pycache__/**,**/node_modules/**,**/migrations/**,frontend/app/**/_layout.tsx,**/coverage/**,backend/tests/**,frontend/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py
sonar.cpd.exclusions=backend/tests/**,frontend/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py

sonar.coverage.exclusions=backend/app/firebase/**,backend/app/core/supabase.py,frontend/components/index.ts,frontend/components/onboarding/first-page.tsx

# Suppress hardcoded-credential false positives in test files
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=pythonsecurity:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=backend/tests/**
                                                                                                                                                    
sonar.cpd.minimumTokens=300